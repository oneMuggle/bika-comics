name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'


      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Drift Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        # 第二十一批（2026-07-11）：显式安装 NDK + cmake。
        # android-actions/setup-android@v4 默认 packages 为 'tools platform-tools'，
        # 不含 NDK/cmake。app/build.gradle.kts 中 ndkVersion = "27.0.12077973"，
        # Flutter 3.32+ 的 gradle plugin 总是指向空 CMakeLists.txt 触发 cmake configure。
        # 若依赖 AGP 在 build 阶段自动下载 NDK，构建会在 cmake configure 失败
        # （"Could not find toolchain file: NDK/build/cmake/android.toolchain.cmake"），
        # Build APK step 耗时从 258s 降到 169s（失败前置退出）。
        # 显式在 Setup 阶段装好 NDK + cmake 可以避免此 race。
        #
        # 注意：setup-android@v4 的 packages 解析用 split(" ")（空格分隔），
        # 不能用 YAML 块（|）多行格式。必须单行空格分隔。
        with:
          packages: cmdline-tools;latest platform-tools platforms;android-36 build-tools;36.0.0 ndk;27.0.12077973 cmake;3.22.1
        # GitHub Actions 的 android-actions/setup-android@v4 偶发失败 (网络 / 缓存抖动)。
        # 用 continue-on-error + 重试模式保证 build 流程稳定。
        continue-on-error: true

      - name: Retry Setup Android SDK
        if: steps.setup-android-sdk.outcome == 'failure'
        run: |
          echo "::warning::第一次 android-actions/setup-android@v4 失败，重试中..."
          sleep 15
          rm -rf /opt/android-sdk* 2>/dev/null || true
          rm -rf /usr/local/lib/android/sdk 2>/dev/null || true

      - name: Setup Android SDK (retry)
        if: steps.setup-android-sdk.outcome == 'failure'
        uses: android-actions/setup-android@v4
        with:
          packages: cmdline-tools;latest platform-tools platforms;android-36 build-tools;36.0.0 ndk;27.0.12077973 cmake;3.22.1

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: picacg-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'


      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Drift Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        # 第二十一批（2026-07-11）：显式安装 NDK + cmake，详见 build job 同名 step 注释。
        # packages 必须是单行空格分隔（v4 内部用 split(" ") 解析）。
        with:
          packages: cmdline-tools;latest platform-tools platforms;android-36 build-tools;36.0.0 ndk;27.0.12077973 cmake;3.22.1
        # GitHub Actions 的 android-actions/setup-android@v4 偶发失败 (网络 / 缓存抖动)。
        # 用 continue-on-error + 重试模式保证 build-release 流程稳定。
        continue-on-error: true

      - name: Retry Setup Android SDK
        if: steps.setup-android-sdk.outcome == 'failure'
        run: |
          echo "::warning::第一次 android-actions/setup-android@v4 失败，重试中..."
          sleep 15
          # 第二次：清理可能残留的 SDK 缓存后重试
          rm -rf /opt/android-sdk* 2>/dev/null || true
          rm -rf /usr/local/lib/android/sdk 2>/dev/null || true

      - name: Setup Android SDK (retry)
        if: steps.setup-android-sdk.outcome == 'failure'
        uses: android-actions/setup-android@v4
        with:
          packages: cmdline-tools;latest platform-tools platforms;android-36 build-tools;36.0.0 ndk;27.0.12077973 cmake;3.22.1

      - name: Verify Android SDK
        run: |
          if [ ! -d "$ANDROID_HOME" ] || [ ! -d "$ANDROID_HOME/cmdline-tools" ]; then
            echo "::error::ANDROID_HOME 未正确设置: $ANDROID_HOME"
            exit 1
          fi
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME"

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build Release APK
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app.jks
            flutter build apk --release \
              -Pkeystore=app.jks \
              -Pkeystore-password="$KEYSTORE_PASSWORD" \
              -Pkey-alias="$KEY_ALIAS" \
              -Pkey-password="$KEY_PASSWORD"
          else
            flutter build apk --release
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: picacg-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Tag
        if: env.KEYSTORE_BASE64 != ''
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 如果 tag 已存在则先删除（允许重复构建推送同一版本）
          git tag -d "v$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/v$VERSION" 2>/dev/null || true
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
