name: Create GitHub Release

on:
  workflow_run:
    workflows: [Build Android APK]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Wait for artifact availability
        # GitHub Actions 在 workflow_run 场景下, artifacts 有最终一致性延迟
        # 60s 是社区推荐的稳妥值
        run: sleep 60
        shell: bash

      - name: Download Release APK via gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.event.workflow_run.id }}" \
            --name "picacg-release-apk" \
            --dir .
          ls -la
          ls -la app-release.apk 2>/dev/null || find . -name "*.apk" -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: app-release.apk
          body: |
            ## 哔咔漫画 Android 构建产物

            **构建时间**: ${{ github.ref_name }} @ ${{ github.event.workflow_run.event.head_commit.timestamp }}

            ---
            *由 GitHub Actions 自动构建发布*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}